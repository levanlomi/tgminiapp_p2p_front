    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="app-title">RUB to VND</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .dark-theme {
            --bg-color: #1c1c1c;
            --text-color: #ffffff;
            --secondary-bg-color: #2c2c2c;
            --hint-color: #888888;
            --card-shadow: 0 4px 20px rgba(255,255,255,0.03);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            transition: background-color 0.3s ease;
            height: 100vh;
            overflow: hidden; /* Запрет скролла */
        }
        
        .card { background-color: rgba(var(--secondary-bg-color), 0.8); backdrop-filter: blur(12px); }
        .tier-card { 
            background-color: var(--bg-color); 
            box-shadow: var(--card-shadow); 
        }
        .tg-button { background-color: var(--button-color); color: var(--button-text-color); }
    </style>
</head>
<body class="p-4 pt-6 flex flex-col items-center min-h-screen">

    <div id="app" class="w-full max-w-md card rounded-3xl p-6 shadow-sm flex flex-col gap-5 relative z-10">
        
        <div class="flex justify-between items-center w-full">
            <div class="w-8"></div>
            <span class="text-xs font-semibold tracking-wide uppercase" style="color: var(--hint-color)" id="header-label"></span>
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>

        <div class="text-center -mt-2">
            <h1 class="text-2xl font-bold" id="subheader-label"></h1>
            <p class="text-xs mt-1" style="color: var(--hint-color)" id="update-time"></p>
        </div>

        <div id="tiers-container" class="flex flex-col gap-3"></div>
        
        <button id="refresh-btn" class="tg-button w-full py-4 rounded-2xl font-bold text-lg shadow-md"></button>
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        });
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
    </script>
    <script src="app.js"></script>
</body>
</html>
