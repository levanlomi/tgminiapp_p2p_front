<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="app-title">RUB to VND</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden; /* Предотвращаем горизонтальный скролл от фона */
        }
        
        /* --- Атмосферный динамический фон (согласно гайдлайну) --- */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15; /* Легкая непрозрачность, подстраивается под тему */
            z-index: -1;
            pointer-events: none; /* Пропускает тапы сквозь себя */
            animation: float 10s infinite alternate ease-in-out;
        }
        
        .blob-1 {
            width: 300px;
            height: 300px;
            background-color: var(--button-color);
            top: -50px;
            left: -100px;
        }
        
        .blob-2 {
            width: 250px;
            height: 250px;
            background-color: var(--hint-color);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
            animation-duration: 12s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }
        /* --------------------------------------------------------- */
        
        .card {
            background-color: var(--secondary-bg-color);
            /* Эффект матового стекла для карточки */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            /* Делаем фон карточки чуть прозрачным, чтобы видеть анимацию под ней */
            background-color: rgba(var(--tg-theme-secondary-bg-color, 240, 240, 240), 0.8);
        }
        
        .tier-card {
            background-color: var(--bg-color);
        }

        .tg-button {
            background-color: var(--button-color);
            color: var(--button-text-color);
            transition: opacity 0.2s ease;
        }
        
        .tg-button:active {
            opacity: 0.7; /* Отказ от hover, только active для мобильных */
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen relative">
    
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div id="app" class="w-full max-w-md card rounded-3xl p-6 shadow-sm flex flex-col gap-6 relative z-10">
        
        <div class="flex flex-col items-center gap-1 text-center">
            <span class="text-sm font-medium tracking-wide" style="color: var(--hint-color)" id="header-label"></span>
            <h1 class="text-xl font-bold mt-1" id="subheader-label"></h1>
        </div>

        <div id="tiers-container" class="flex flex-col gap-3">
            </div>

        <button id="refresh-btn" class="tg-button w-full py-4 rounded-2xl font-bold text-lg mt-2 shadow-md">
            </button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
